<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controla tus Lucas</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f6fa;
}

.header{
  background:linear-gradient(45deg,#7b4dff,#a64dff);
  color:white;
  text-align:center;
  padding:20px;
}

.header img{
  width:60px;
  margin-bottom:10px;
}

.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input, select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#7b4dff;
  color:white;
  font-weight:bold;
}

.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#7b4dff;
  color:white;
  font-size:30px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:15px;
  width:90%;
}
</style>
</head>

<body>

<div class="header">
  <img src="ChatGPT Image 5 may 2026, 08_01_17.png">
  <h2 id="saludo">Hola 👋</h2>
  <h1 id="saldo">$0</h1>
</div>

<div class="card">
  <h3>Movimientos</h3>
  <div id="lista"></div>
</div>

<div class="fab" onclick="abrir()">+</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Agregar movimiento</h2>

    <input id="nombre" placeholder="Nombre">
    <input id="monto" type="number" placeholder="Monto">

    <select id="tipo">
      <option value="ingreso">Ingreso</option>
      <option value="gasto">Gasto</option>
    </select>

    <button onclick="guardar()">Guardar</button>
    <button onclick="cerrar()">Cerrar</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
