<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#7c3aed">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>CuidaTusLucas 💜</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
.pantalla { display: none; }
.activa { display: block; }
</style>
</head>

<body class="bg-gradient-to-br from-pink-100 to-violet-100 min-h-screen p-4">

<div class="max-w-md mx-auto bg-white rounded-3xl p-6 shadow-xl">

<h1 class="text-2xl font-black mb-4 text-center">💜 CuidaTusLucas</h1>

<!-- NAV -->
<div class="flex justify-around mb-4">
<button onclick="mostrarPantalla('home')">🏠</button>
<button onclick="mostrarPantalla('movimientos')">💸</button>
<button onclick="mostrarPantalla('metas')">🎯</button>
<button onclick="mostrarPantalla('perfil')">👤</button>
</div>

<!-- HOME -->
<div id="home" class="pantalla activa">
<div class="bg-violet-50 p-4 rounded-xl mb-4">
<p>Total: <span id="total">$0</span></p>
<p>Ingresos: <span id="ingresos" class="text-green-500">$0</span></p>
<p>Gastos: <span id="gastos" class="text-red-500">$0</span></p>
</div>
<div id="ultimos"></div>
</div>

<!-- MOVIMIENTOS -->
<div id="movimientos" class="pantalla">

<input id="desc" placeholder="Descripción" class="w-full p-2 border rounded mb-2">
<input id="monto" type="number" placeholder="Monto" class="w-full p-2 border rounded mb-2">

<select id="tipo" class="w-full p-2 border rounded mb-2">
<option value="gasto">Gasto</option>
<option value="ingreso">Ingreso</option>
</select>

<select id="categoria" class="w-full p-2 border rounded mb-2">
<option>Comida</option>
<option>Transporte</option>
<option>Casa</option>
<option>Otro</option>
</select>

<button onclick="agregar()" class="w-full bg-violet-500 text-white py-2 rounded-xl">
Guardar
</button>

<div id="lista" class="mt-4"></div>

</div>

<!-- METAS -->
<div id="metas" class="pantalla">

<input id="metaNombre" placeholder="Meta (ej: Viaje)" class="w-full p-2 border rounded mb-2">
<input id="metaMonto" type="number" placeholder="Monto objetivo" class="w-full p-2 border rounded mb-2">

<button onclick="guardarMeta()" class="w-full bg-green-500 text-white py-2 rounded-xl">
Guardar Meta
</button>

<div id="metasLista" class="mt-4"></div>

</div>

<!-- PERFIL -->
<div id="perfil" class="pantalla">

<input id="nombre" placeholder="Tu nombre" class="w-full p-2 border rounded mb-2">

<button onclick="guardarPerfil()" class="w-full bg-blue-500 text-white py-2 rounded-xl">
Guardar Perfil
</button>

<p class="mt-4">Hola, <span id="nombreMostrado"></span> 💜</p>

</div>

</div>

<script>

let datos = JSON.parse(localStorage.getItem("datos")) || [];
let metas = JSON.parse(localStorage.getItem("metas")) || [];
let perfil = JSON.parse(localStorage.getItem("perfil")) || {};

function guardarStorage() {
    localStorage.setItem("datos", JSON.stringify(datos));
}

function mostrarPantalla(id) {
    document.querySelectorAll(".pantalla").forEach(p => p.classList.remove("activa"));
    document.getElementById(id).classList.add("activa");
}

function agregar() {
    let d = document.getElementById("desc").value;
    let m = Number(document.getElementById("monto").value);
    let t = document.getElementById("tipo").value;
    let c = document.getElementById("categoria").value;

    if (!d || !m) return alert("Completa los datos");

    datos.push({ d, m, t, c });
    guardarStorage();
    render();

    document.getElementById("desc").value = "";
    document.getElementById("monto").value = "";
}

function eliminar(i) {
    datos.splice(i, 1);
    guardarStorage();
    render();
}

function render() {
    let total = 0, ingresos = 0, gastos = 0;

    let lista = document.getElementById("lista");
    let ultimos = document.getElementById("ultimos");

    lista.innerHTML = "";
    ultimos.innerHTML = "";

    datos.slice().reverse().forEach((x, i) => {

        if (x.t === "ingreso") {
            total += x.m;
            ingresos += x.m;
        } else {
            total -= x.m;
            gastos += x.m;
        }

        let html = `
        <div class="flex justify-between bg-gray-50 p-2 rounded mb-2">
        <div>
        <p class="font-bold">${x.d}</p>
        <p class="text-xs">${x.c}</p>
        </div>
        <div class="flex items-center gap-2">
        <span class="${x.t === 'gasto' ? 'text-red-500' : 'text-green-500'}">
        ${x.t === 'gasto' ? '-' : '+'}$${x.m}
        </span>
        <button onclick="eliminar(${i})" class="text-red-500">❌</button>
        </div>
        </div>
        `;

        lista.innerHTML += html;

        if (i < 3) ultimos.innerHTML += html;
    });

    document.getElementById("total").innerText = "$" + total;
    document.getElementById("ingresos").innerText = "$" + ingresos;
    document.getElementById("gastos").innerText = "$" + gastos;
}

function guardarMeta() {
    let n = document.getElementById("metaNombre").value;
    let m = document.getElementById("metaMonto").value;

    metas.push({ n, m });
    localStorage.setItem("metas", JSON.stringify(metas));
    renderMetas();
}

function renderMetas() {
    let cont = document.getElementById("metasLista");
    cont.innerHTML = "";

    metas.forEach(x => {
        cont.innerHTML += `
        <div class="bg-green-50 p-2 rounded mb-2">
        ${x.n} - $${x.m}
        </div>`;
    });
}

function guardarPerfil() {
    let n = document.getElementById("nombre").value;
    perfil.nombre = n;
    localStorage.setItem("perfil", JSON.stringify(perfil));
    document.getElementById("nombreMostrado").innerText = n;
}

if (perfil.nombre) {
    document.getElementById("nombreMostrado").innerText = perfil.nombre;
}

render();
renderMetas();

</script>

</body>
</html>
