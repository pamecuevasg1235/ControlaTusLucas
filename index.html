<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ControlaTusLucas</title>

<style>
:root{
  --main:#7b4dff;
  --bg:#f3f4f6;
}
body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
}

.header{
  background:linear-gradient(45deg,#7b4dff,#e040fb);
  color:white;
  padding:20px;
  border-radius:0 0 20px 20px;
}
.saldo{
  font-size:28px;
  font-weight:bold;
}

.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

.item{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  padding:10px;
  background:#fafafa;
  border-radius:10px;
}

.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:30px;
  background:var(--main);
  color:white;
  border:none;
}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:15px;
  width:90%;
}

input,textarea,select{
  width:100%;
  padding:10px;
  margin-top:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--main);
  color:white;
  margin-top:10px;
}

.bar{
  height:10px;
  background:#ddd;
  border-radius:10px;
  margin-top:5px;
}
.bar-fill{
  height:10px;
  background:var(--main);
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
  <h2>ControlaTusLucas</h2>
  <div class="saldo" id="saldo">$0</div>
</div>

<div class="card">
  <h3>Resumen por categoría</h3>
  <div id="grafico"></div>
</div>

<div class="card">
  <h3>Movimientos</h3>
  <div id="lista"></div>
</div>

<div class="card">
  <h3>Metas</h3>
  <div id="metas"></div>
  <button onclick="crearMeta()">+ Nueva meta</button>
</div>

<button class="fab" onclick="abrirModal()">+</button>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Agregar movimiento</h3>

<input id="nombre" placeholder="Descripción">
<input id="monto" type="number" placeholder="Monto">

<select id="moneda">
<option value="CLP">CLP</option>
<option value="USD">USD</option>
<option value="EUR">EUR</option>
</select>

<select id="tipo">
<option value="gasto">Gasto</option>
<option value="ingreso">Ingreso</option>
</select>

<select id="categoria">
<option>Alimentación</option>
<option>Transporte</option>
<option>Educación</option>
<option>Ahorro</option>
<option>Otros</option>
</select>

<button onclick="agregar()">Guardar</button>

<hr>

<h3>📧 Detectar desde correo</h3>
<textarea id="correo" placeholder="Pega aquí el correo del banco"></textarea>
<button onclick="detectar()">Detectar gasto</button>

<button onclick="cerrarModal()">Cerrar</button>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
